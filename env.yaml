apiVersion: apps/v1
kind: Deployment
metadata:
  name: test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hello-secrets
  template:
    metadata:
      labels:
        app: hello-secrets
      annotations:
        akeyless/enabled: "true"
    spec:
      # Setup for pod (Pod-level Security)
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 2000
      containers:
      - name: alpine
        image: alpine:3.19
        command:
          - "sh"
          - "-c"
          - "echo [$(date)] Injected value of /K8s/InjectorDemo/InjectorSecret is: $MY_SECRET && echo going to sleep... && sleep 10000"
        # Setup for container
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          seccompProfile:
            type: RuntimeDefault
        resources:
          limits:
            cpu: "100m"
            memory: "128Mi"
          requests:
            cpu: "50m"
            memory: "64Mi"
        env:
        - name: MY_SECRET
          value: akeyless:/K8s/InjectorDemo/InjectorSecret